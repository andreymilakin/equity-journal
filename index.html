<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Points of Leverage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0d0f; --bg2:#111519; --bg3:#181d22;
    --border:#1e252d; --border2:#2a3340;
    --text:#e8edf2; --text2:#7a8fa0; --text3:#4a5a6a;
    --accent:#c8a96e; --green:#5aad8a; --red:#c06060; --orange:#d4855a;
    --nav-h:60px; --top-h:56px;
  }
  html,body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; font-size:14px; line-height:1.6; min-height:100vh; -webkit-text-size-adjust:100%; }

  /* DESKTOP */
  .shell { display:flex; min-height:100vh; }
  .sidebar { width:260px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .sidebar-header { padding:28px 24px 20px; border-bottom:1px solid var(--border); }
  .logo { font-family:'Instrument Serif',serif; font-size:18px; color:var(--accent); }
  .logo-sub { font-size:10px; color:var(--text3); letter-spacing:.15em; text-transform:uppercase; margin-top:2px; }
  .sidebar-search { padding:16px 16px 12px; }
  .search-input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:8px 12px; color:var(--text); font-family:'DM Mono',monospace; font-size:12px; outline:none; transition:border-color .2s; }
  .search-input::placeholder { color:var(--text3); }
  .search-input:focus { border-color:var(--border2); }
  .sidebar-section { padding:8px 16px 4px; font-size:10px; color:var(--text3); letter-spacing:.15em; text-transform:uppercase; }
  .filter-btn { display:block; width:calc(100% - 32px); margin:2px 16px; background:none; border:none; border-radius:5px; padding:7px 10px; text-align:left; cursor:pointer; font-family:'DM Mono',monospace; font-size:12px; color:var(--text2); transition:all .15s; }
  .filter-btn:hover { background:var(--bg3); color:var(--text); }
  .filter-btn.active { background:var(--bg3); color:var(--accent); border-left:2px solid var(--accent); padding-left:8px; }
  .filter-count { float:right; font-size:10px; color:var(--text3); margin-top:1px; }
  .add-btn { margin:16px; width:calc(100% - 32px); background:var(--accent); border:none; border-radius:6px; padding:10px; color:#0a0d0f; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; cursor:pointer; letter-spacing:.05em; transition:opacity .2s; }
  .add-btn:hover { opacity:.88; }
  .main { flex:1; padding:40px 48px; max-width:960px; }

  /* MOBILE TOP BAR */
  .mobile-topbar { display:none; position:fixed; top:0; left:0; right:0; height:var(--top-h); background:var(--bg2); border-bottom:1px solid var(--border); align-items:center; justify-content:space-between; padding:0 16px; z-index:50; }
  .mobile-logo { font-family:'Instrument Serif',serif; font-size:16px; color:var(--accent); white-space:nowrap; }
  .mobile-search-wrap { flex:1; margin:0 10px; }
  .mobile-add-btn { background:var(--accent); border:none; border-radius:6px; padding:7px 12px; color:#0a0d0f; font-family:'DM Mono',monospace; font-size:11px; font-weight:500; cursor:pointer; white-space:nowrap; }

  /* MOBILE BOTTOM NAV */
  .mobile-nav { display:none; position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:var(--bg2); border-top:1px solid var(--border); z-index:50; align-items:stretch; }
  .nav-tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; font-size:9px; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; gap:4px; padding:8px 2px; transition:color .15s; }
  .nav-tab.active { color:var(--accent); }
  .nav-tab svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }

  /* FILTER SHEET */
  .filter-sheet { display:none; position:fixed; bottom:var(--nav-h); left:0; right:0; background:var(--bg2); border-top:1px solid var(--border); padding:16px; z-index:40; max-height:55vh; overflow-y:auto; }
  .filter-sheet.open { display:block; }
  .filter-sheet-title { font-size:10px; color:var(--text3); letter-spacing:.15em; text-transform:uppercase; margin-bottom:10px; }
  .filter-chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { background:var(--bg3); border:1px solid var(--border2); border-radius:20px; padding:5px 14px; font-family:'DM Mono',monospace; font-size:11px; color:var(--text2); cursor:pointer; transition:all .15s; }
  .chip.active { background:rgba(200,169,110,.15); color:var(--accent); border-color:var(--accent); }

  /* PAGE */
  .page-header { margin-bottom:28px; border-bottom:1px solid var(--border); padding-bottom:20px; }
  .page-title { font-family:'Instrument Serif',serif; font-size:32px; color:var(--text); font-weight:400; letter-spacing:-.02em; }
  .page-meta { font-size:11px; color:var(--text3); margin-top:6px; letter-spacing:.08em; }

  /* STATS */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }
  .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
  .stat-label { font-size:10px; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; margin-bottom:5px; }
  .stat-val { font-size:20px; color:var(--text); font-family:'Instrument Serif',serif; }
  .stat-sub { font-size:10px; color:var(--text3); margin-top:2px; }

  /* CARDS */
  .cards-grid { display:flex; flex-direction:column; gap:14px; }
  .thesis-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:20px 22px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
  .thesis-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
  .thesis-card.buy::before { background:var(--green); }
  .thesis-card.hold::before { background:var(--accent); }
  .thesis-card.watch::before { background:var(--orange); }
  .thesis-card:hover { border-color:var(--border2); transform:translateY(-1px); }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .card-ticker { font-size:22px; color:var(--text); font-family:'Instrument Serif',serif; }
  .card-name { font-size:11px; color:var(--text3); margin-top:2px; }
  .card-right { text-align:right; }
  .card-view { font-size:10px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; padding:3px 10px; border-radius:4px; }
  .card-view.buy { background:rgba(90,173,138,.15); color:var(--green); }
  .card-view.hold { background:rgba(200,169,110,.15); color:var(--accent); }
  .card-view.watch { background:rgba(212,133,90,.15); color:var(--orange); }
  .card-price { font-size:12px; color:var(--text2); margin-top:4px; }
  .card-upside { font-size:11px; margin-top:2px; }
  .card-upside.pos { color:var(--green); }
  .card-upside.neg { color:var(--red); }
  .card-thesis { font-size:12px; color:var(--text2); line-height:1.65; margin-bottom:12px; }
  .point-row { display:flex; gap:8px; margin-bottom:5px; font-size:11px; color:var(--text2); line-height:1.5; }
  .point-dot { width:4px; height:4px; border-radius:50%; background:var(--accent); flex-shrink:0; margin-top:6px; }
  .card-meta { display:flex; justify-content:space-between; padding-top:12px; border-top:1px solid var(--border); font-size:10px; color:var(--text3); }

  /* DETAIL */
  .detail-view { display:none; }
  .detail-view.active { display:block; }
  .list-view.hidden { display:none; }
  .back-btn { background:none; border:none; color:var(--text3); font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; padding:0 0 24px; letter-spacing:.05em; transition:color .15s; }
  .back-btn:hover { color:var(--accent); }
  .detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:16px; }
  .detail-ticker { font-family:'Instrument Serif',serif; font-size:44px; color:var(--text); line-height:1; }
  .detail-name { font-size:13px; color:var(--text3); margin-top:6px; }
  .detail-industry-badge { font-size:10px; color:var(--text3); border:1px solid var(--border2); border-radius:4px; padding:3px 10px; margin-top:8px; display:inline-block; }
  .detail-kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:24px; }
  .detail-kpi { background:var(--bg3); border:1px solid var(--border); border-radius:7px; padding:12px 14px; }
  .detail-kpi-label { font-size:10px; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
  .detail-kpi-val { font-size:12px; color:var(--text); }
  .detail-section { margin-bottom:24px; }
  .detail-section-title { font-size:10px; color:var(--text3); letter-spacing:.15em; text-transform:uppercase; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .detail-body { font-size:13px; color:var(--text2); line-height:1.75; }
  .thesis-points-list { list-style:none; }
  .thesis-points-list li { display:flex; gap:10px; margin-bottom:10px; font-size:13px; color:var(--text2); line-height:1.65; }
  .thesis-points-list li::before { content:''; width:4px; height:4px; border-radius:50%; background:var(--accent); flex-shrink:0; margin-top:8px; }
  .two-col-detail { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .detail-list { list-style:none; }
  .detail-list li { display:flex; gap:8px; margin-bottom:8px; font-size:12px; color:var(--text2); line-height:1.5; }
  .detail-actions { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
  .btn-action { background:none; border:1px solid var(--border2); border-radius:6px; padding:8px 16px; color:var(--text2); font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; transition:all .15s; }
  .btn-action:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger:hover { border-color:var(--red) !important; color:var(--red) !important; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100; align-items:center; justify-content:center; padding:16px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg2); border:1px solid var(--border2); border-radius:12px; padding:24px 28px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; }
  .modal-title { font-family:'Instrument Serif',serif; font-size:22px; color:var(--text); margin-bottom:18px; }
  .form-row { margin-bottom:14px; }
  .form-label { font-size:10px; color:var(--text3); letter-spacing:.12em; text-transform:uppercase; margin-bottom:5px; display:block; }
  .form-input,.form-select,.form-textarea { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:9px 12px; color:var(--text); font-family:'DM Mono',monospace; font-size:12px; outline:none; transition:border-color .2s; }
  .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--accent); }
  .form-select option { background:var(--bg2); }
  .form-textarea { resize:vertical; min-height:72px; }
  .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:18px; border-top:1px solid var(--border); }
  .btn-cancel { background:none; border:1px solid var(--border2); border-radius:6px; padding:8px 18px; color:var(--text2); font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; }
  .btn-save { background:var(--accent); border:none; border-radius:6px; padding:8px 18px; color:#0a0d0f; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; cursor:pointer; }

  .no-results { padding:48px; text-align:center; color:var(--text3); font-size:13px; }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .thesis-card { animation:fadeIn .25s ease forwards; }

  /* MOBILE OVERRIDES */
  @media (max-width:768px) {
    .sidebar { display:none; }
    .mobile-topbar { display:flex; }
    .mobile-nav { display:flex; }
    .shell { display:block; }
    .main { padding:16px 16px calc(var(--nav-h) + 20px); margin-top:var(--top-h); max-width:100%; }
    .page-header { margin-bottom:16px; padding-bottom:14px; }
    .page-title { font-size:22px; }
    .stats-row { grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; }
    .stat-val { font-size:18px; }
    .thesis-card { padding:16px 16px 14px; }
    .card-ticker { font-size:18px; }
    .cards-grid { gap:10px; }
    .detail-ticker { font-size:30px; }
    .detail-kpis { grid-template-columns:1fr 1fr; gap:8px; }
    .two-col-detail { grid-template-columns:1fr; }
    .detail-header { flex-direction:column; gap:10px; }
    .back-btn { padding:0 0 16px; }
    .form-row-2 { grid-template-columns:1fr; }
    .modal { padding:18px; }
  }
</style>
</head>
<body>

<!-- MOBILE TOP BAR -->
<div class="mobile-topbar">
  <div class="mobile-logo">Points of Leverage</div>
  <div class="mobile-search-wrap">
    <input class="search-input" type="text" placeholder="Search..." id="mobileSearch" oninput="syncSearch(this)" style="font-size:13px;padding:6px 10px">
  </div>
  <button class="mobile-add-btn" onclick="openModal()">+ Add</button>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="mobile-nav" id="mobileNav">
  <button class="nav-tab active" id="tab-all" onclick="mobileFilter('all',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>All
  </button>
  <button class="nav-tab" id="tab-buy" onclick="mobileFilter('buy',this)">
    <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Buy
  </button>
  <button class="nav-tab" id="tab-hold" onclick="mobileFilter('hold',this)">
    <svg viewBox="0 0 24 24"><line x1="5" y1="8" x2="19" y2="8"/><line x1="5" y1="12" x2="19" y2="12"/><line x1="5" y1="16" x2="19" y2="16"/></svg>Hold
  </button>
  <button class="nav-tab" id="tab-watch" onclick="mobileFilter('watch',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/></svg>Watch
  </button>
  <button class="nav-tab" id="tab-filter" onclick="toggleFilterSheet(this)">
    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>Filter
  </button>
</nav>

<!-- MOBILE FILTER SHEET -->
<div class="filter-sheet" id="filterSheet">
  <div class="filter-sheet-title">Industry</div>
  <div class="filter-chips" id="industryChips"></div>
</div>

<div class="shell">
  <!-- DESKTOP SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Points of Leverage</div>
      <div class="logo-sub">Investment Journal</div>
    </div>
    <div class="sidebar-search">
      <input class="search-input" type="text" placeholder="Search ticker, name..." id="desktopSearch" oninput="syncSearch(this)">
    </div>
    <div class="sidebar-section">View</div>
    <button class="filter-btn active" onclick="setFilter('view','all',this)">All positions <span class="filter-count" id="count-all">0</span></button>
    <button class="filter-btn" onclick="setFilter('view','buy',this)">Add / Buy <span class="filter-count" id="count-buy">0</span></button>
    <button class="filter-btn" onclick="setFilter('view','hold',this)">Hold <span class="filter-count" id="count-hold">0</span></button>
    <button class="filter-btn" onclick="setFilter('view','watch',this)">Watch <span class="filter-count" id="count-watch">0</span></button>
    <div class="sidebar-section" style="margin-top:12px">Industry</div>
    <div id="industryFilters"></div>
    <div style="flex:1"></div>
    <button class="add-btn" onclick="openModal()">+ New thesis</button>
  </aside>

  <main class="main">
    <div class="list-view" id="listView">
      <div class="page-header">
        <div class="page-title">Investment Theses</div>
        <div class="page-meta" id="pageMeta"></div>
      </div>
      <div class="stats-row" id="statsRow"></div>
      <div class="cards-grid" id="cardsGrid"></div>
      <div class="no-results" id="noResults" style="display:none">No positions match your filters.</div>
    </div>
    <div class="detail-view" id="detailView">
      <button class="back-btn" onclick="showList()">← Back</button>
      <div id="detailContent"></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">New Thesis</div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">Ticker</label><input class="form-input" id="f-ticker" placeholder="NVDA" style="text-transform:uppercase"></div>
      <div class="form-row"><label class="form-label">Company name</label><input class="form-input" id="f-name" placeholder="Nvidia Corp"></div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">Industry</label><input class="form-input" id="f-industry" placeholder="Semiconductors"></div>
      <div class="form-row"><label class="form-label">View</label>
        <select class="form-select" id="f-view">
          <option value="buy">Add / Buy</option>
          <option value="hold">Hold</option>
          <option value="watch">Watch</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">Current price</label><input class="form-input" id="f-price" placeholder="$90.39"></div>
      <div class="form-row"><label class="form-label">Price target</label><input class="form-input" id="f-target" placeholder="$145"></div>
    </div>
    <div class="form-row"><label class="form-label">Investment summary</label><textarea class="form-textarea" id="f-summary" placeholder="Core reason to own..."></textarea></div>
    <div class="form-row"><label class="form-label">Thesis points (one per line)</label><textarea class="form-textarea" id="f-points" placeholder="Revenue inflection&#10;Market dominance..."></textarea></div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">Risks (one per line)</label><textarea class="form-textarea" id="f-risks" placeholder="Competition&#10;Valuation..."></textarea></div>
      <div class="form-row"><label class="form-label">Catalysts (one per line)</label><textarea class="form-textarea" id="f-catalysts" placeholder="Q1 earnings&#10;Trial readout..."></textarea></div>
    </div>
    <div class="form-row"><label class="form-label">Key financials (one per line)</label><textarea class="form-textarea" id="f-financials" placeholder="FY25 Revenue: $22.9B +36%&#10;Net Income: $1.6B +260%..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveThesis()">Save</button>
    </div>
  </div>
</div>

  {id:'BSX',ticker:'BSX',name:'Boston Scientific',industry:'MedTech',view:'hold',price:'~$78',target:'$105',upside:'+35%',upsideClass:'pos',date:'Mar 2026',
    summary:'World-class cardiac device maker behind FARAPULSE (AFib treatment) and WATCHMAN (stroke prevention). Sold off on competition fears and a growth guidance cut from 20% to 11% — FCF, margins, and the long-term patient opportunity remain intact.',
    points:['FY25 revenue +16% to $20.1B — 12 consecutive quarters of double-digit growth. FCF grew 38% to $3.7B; guided $4.2B for 2026.','FARAPULSE holds ~70% US market in pulsed field ablation. Competition arrived (Medtronic) but addressable market still expanding globally.','WATCHMAN: only 600K of 5M eligible patients treated. CHAMPION trial (28 Mar 2026) could expand the pool to 20M — almost entirely unpriced.','Penumbra acquisition adds high-growth neurovascular segment. Dilutive near-term but strategically sound.','25 of 35 analysts rate BSX a Buy; zero sell ratings. Consensus target ~$105 implies ~35% upside.'],
    risks:['Medtronic dual-energy device could take share in new hospital accounts','Penumbra leverage (3.3x EBITDA peak) limits near-term flexibility','Class action lawsuits (routine post-selloff but add noise)','CHAMPION trial risk — binary catalyst could disappoint'],
    catalysts:['28 Mar 2026: CHAMPION trial — potential 4x WATCHMAN market expansion','Q1 2026 results: margin stabilisation signal','Penumbra deal close and integration update','FARAPULSE international adoption metrics'],
    financials:['FY25 Revenue: $20.1B (+16% YoY)','FY25 FCF: $3.7B (+38% YoY)','FY26E Revenue: $22.3B (+11%)','FY26E Adj. EPS: $3.46 (+13%)','EBIT Margin: 28% expanding','Consensus Target: ~$105 (+35%)']},
  {id:'GLEN',ticker:'GLEN',name:'Glencore plc',industry:'Metals & Mining',view:'buy',price:'~390p / $7.11',target:'500–550p',upside:'+28–41%',upsideClass:'pos',date:'Mar 2026',
    summary:'The world\'s largest diversified commodities company — uniquely combining a mining business with a global trading operation across 60+ commodities. Structurally positioned for the energy transition via copper and cobalt, while coal cash flows fund shareholder returns today.',
    points:['Copper production pathway to 1 million tonnes by end-2028 and 1.6 million tonnes by 2035 — one of the largest copper growth profiles globally. AI infrastructure and energy transition demand underpin a structural multi-year copper deficit.','The trading business is unique and irreplaceable — $2.3–3.5B annual Marketing EBIT underpins returns through commodity cycles. No other listed miner has this embedded earnings floor.','Coal cash flows fund the copper build-out and shareholder distributions. FY2025 annualised FCF at spot prices: ~$7B. $0.17/share distribution proposed for 2026.','Cobalt optionality: DRC export quotas easing with 87,000 tonnes/year allocated for 2026–2027. Glencore is the world\'s largest cobalt producer — stockpiled inventory ready to sell.','Rio Tinto merger speculation adds a potential re-rating catalyst. Even without a deal, the attention validates the asset quality of the portfolio.'],
    risks:['Commodity price volatility — copper, coal, and cobalt all cyclical','China slowdown would materially impact metals demand','DRC political/operational risk at KCC and Mutanda','Coal ESG overhang — some institutional investors restricted','Copper production guidance has been missed historically'],
    catalysts:['Copper volume ramp H2 2026 — grade recovery at Collahuasi and KCC','Cobalt export quota utilisation — stockpile monetisation begins','Rio Tinto merger update / formal bid announcement','Sustained copper price above $10,000/t unlocks project optionality','Alumbrera restart targeted H1 2028 — 75kt copper + 317koz gold'],
    financials:['Market Cap: ~$82B','FY25 Revenue: ~$248B','Annualised FCF at spot: ~$7B','Marketing EBIT guidance: $2.3–3.5B p.a.','FY25 Copper production: 851,600t','2035 Copper target: 1.6 million tonnes','Distribution: $0.17/share (2025, paid 2026)']}
];

let theses=[],activeView='all',activeIndustry='all';

function load(){const s=localStorage.getItem(STORAGE_KEY);theses=s?JSON.parse(s):JSON.parse(JSON.stringify(SEED));if(!s)save();}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(theses));}

function getQuery(){
  const isMobile=window.innerWidth<=768;
  const el=document.getElementById(isMobile?'mobileSearch':'desktopSearch');
  return el?el.value.toLowerCase():'';
}
function syncSearch(el){
  const other=document.getElementById(el.id==='desktopSearch'?'mobileSearch':'desktopSearch');
  if(other)other.value=el.value;
  renderCards();
}

function getFiltered(){
  const q=getQuery();
  return theses.filter(t=>{
    const mv=activeView==='all'||t.view===activeView;
    const mi=activeIndustry==='all'||t.industry===activeIndustry;
    const mq=!q||t.ticker.toLowerCase().includes(q)||t.name.toLowerCase().includes(q)||t.industry.toLowerCase().includes(q);
    return mv&&mi&&mq;
  });
}

function renderStats(){
  const b=theses.filter(t=>t.view==='buy').length,h=theses.filter(t=>t.view==='hold').length,w=theses.filter(t=>t.view==='watch').length;
  const ind=new Set(theses.map(t=>t.industry)).size;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">Positions</div><div class="stat-val">${theses.length}</div><div class="stat-sub">${ind} industries</div></div>
    <div class="stat-card"><div class="stat-label">Buy</div><div class="stat-val" style="color:var(--green)">${b}</div><div class="stat-sub">conviction longs</div></div>
    <div class="stat-card"><div class="stat-label">Hold</div><div class="stat-val" style="color:var(--accent)">${h}</div><div class="stat-sub">maintain</div></div>
    <div class="stat-card"><div class="stat-label">Watch</div><div class="stat-val" style="color:var(--orange)">${w}</div><div class="stat-sub">monitoring</div></div>`;
  document.getElementById('pageMeta').textContent=`${theses.length} theses · ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
}

function renderIndustryFilters(){
  const industries=[...new Set(theses.map(t=>t.industry))].sort();
  const counts={};theses.forEach(t=>{counts[t.industry]=(counts[t.industry]||0)+1;});
  let html=`<button class="filter-btn ${activeIndustry==='all'?'active':''}" onclick="setFilter('industry','all',this)">All industries</button>`;
  industries.forEach(ind=>{html+=`<button class="filter-btn ${activeIndustry===ind?'active':''}" onclick="setFilter('industry','${ind}',this)">${ind} <span class="filter-count">${counts[ind]}</span></button>`;});
  document.getElementById('industryFilters').innerHTML=html;
  let chips=`<div class="chip ${activeIndustry==='all'?'active':''}" onclick="mobileIndustry('all',this)">All</div>`;
  industries.forEach(ind=>{chips+=`<div class="chip ${activeIndustry===ind?'active':''}" onclick="mobileIndustry('${ind}',this)">${ind}</div>`;});
  document.getElementById('industryChips').innerHTML=chips;
}

function updateCounts(){
  document.getElementById('count-all').textContent=theses.length;
  document.getElementById('count-buy').textContent=theses.filter(t=>t.view==='buy').length;
  document.getElementById('count-hold').textContent=theses.filter(t=>t.view==='hold').length;
  document.getElementById('count-watch').textContent=theses.filter(t=>t.view==='watch').length;
}

function renderCards(){
  const filtered=getFiltered();
  const grid=document.getElementById('cardsGrid');
  const no=document.getElementById('noResults');
  if(!filtered.length){grid.innerHTML='';no.style.display='block';return;}
  no.style.display='none';
  const vl=v=>v==='buy'?'Add / Buy':v==='hold'?'Hold':'Watch';
  grid.innerHTML=filtered.map((t,i)=>`
    <div class="thesis-card ${t.view}" onclick="showDetail('${t.id}')" style="animation-delay:${i*.04}s">
      <div class="card-top">
        <div><div class="card-ticker">${t.ticker}</div><div class="card-name">${t.name}</div></div>
        <div class="card-right">
          <span class="card-view ${t.view}">${vl(t.view)}</span>
          <div class="card-price">${t.price} → ${t.target}</div>
          <div class="card-upside ${t.upsideClass}">${t.upside}</div>
        </div>
      </div>
      <div class="card-thesis">${t.summary}</div>
      <div>${t.points.slice(0,2).map(p=>`<div class="point-row"><div class="point-dot"></div><div>${p}</div></div>`).join('')}</div>
      <div class="card-meta"><span>${t.industry}</span><span>${t.date}</span></div>
    </div>`).join('');
}

function renderAll(){renderStats();renderIndustryFilters();updateCounts();renderCards();}

function setFilter(type,val,btn){
  if(type==='view'){activeView=val;document.querySelectorAll('.sidebar .filter-btn').forEach(b=>b.classList.remove('active'));}
  else{activeIndustry=val;}
  if(btn)btn.classList.add('active');
  renderCards();
}

function mobileFilter(val,btn){
  activeView=val;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('filterSheet').classList.remove('open');
  renderCards();
}

function mobileIndustry(val,el){
  activeIndustry=val;
  document.querySelectorAll('.filter-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderIndustryFilters();renderCards();
}

function toggleFilterSheet(btn){
  const sheet=document.getElementById('filterSheet');
  const wasOpen=sheet.classList.contains('open');
  sheet.classList.toggle('open');
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  if(!wasOpen)btn.classList.add('active');
  else document.getElementById(`tab-${activeView}`).classList.add('active');
}

function showDetail(id){
  const t=theses.find(x=>x.id===id);if(!t)return;
  document.getElementById('listView').classList.add('hidden');
  const dv=document.getElementById('detailView');
  dv.classList.add('active');
  const vl=v=>v==='buy'?'Add / Buy':v==='hold'?'Hold':'Watch';
  const kpis=(t.financials||[]).map(f=>{const p=f.split(':');return`<div class="detail-kpi"><div class="detail-kpi-label">${p[0]}</div><div class="detail-kpi-val">${p[1]||''}</div></div>`;}).join('');
  document.getElementById('detailContent').innerHTML=`
    <div class="detail-header">
      <div>
        <div class="detail-ticker">${t.ticker}</div>
        <div class="detail-name">${t.name}</div>
        <div class="detail-industry-badge">${t.industry}</div>
      </div>
      <div>
        <span class="card-view ${t.view}" style="font-size:11px;padding:5px 14px">${vl(t.view)}</span>
        <div style="font-size:20px;color:var(--text);margin-top:8px;font-family:'Instrument Serif',serif">${t.price} <span style="font-size:13px;color:var(--text3)">→ ${t.target}</span></div>
        <div class="card-upside ${t.upsideClass}" style="font-size:13px;margin-top:3px">${t.upside} implied upside</div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">${t.date}</div>
      </div>
    </div>
    <div class="detail-section"><div class="detail-section-title">Investment summary</div><div class="detail-body">${t.summary}</div></div>
    ${kpis?`<div class="detail-section"><div class="detail-section-title">Key financials</div><div class="detail-kpis">${kpis}</div></div>`:''}
    <div class="detail-section"><div class="detail-section-title">Thesis — key points</div><ul class="thesis-points-list">${t.points.map(p=>`<li>${p}</li>`).join('')}</ul></div>
    <div class="two-col-detail">
      <div class="detail-section"><div class="detail-section-title">Risks</div><ul class="detail-list">${t.risks.map(r=>`<li><span style="color:var(--red);margin-right:4px">▸</span>${r}</li>`).join('')}</ul></div>
      <div class="detail-section"><div class="detail-section-title">Catalysts</div><ul class="detail-list">${t.catalysts.map(c=>`<li><span style="color:var(--green);margin-right:4px">▸</span>${c}</li>`).join('')}</ul></div>
    </div>
    <div class="detail-actions">
      <button class="btn-action" onclick="editThesis('${t.id}')">Edit</button>
      <button class="btn-action btn-danger" onclick="deleteThesis('${t.id}')">Delete</button>
    </div>`;
  window.scrollTo(0,0);
}

function showList(){
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('detailView').classList.remove('active');
}

function openModal(prefill){
  ['ticker','name','industry','view','price','target','summary','points','risks','catalysts','financials'].forEach(f=>{
    const el=document.getElementById('f-'+f);if(!el)return;
    el.value=prefill?(Array.isArray(prefill[f])?prefill[f].join('\n'):(prefill[f]||'')):(f==='view'?'buy':'');
  });
  document.getElementById('modalOverlay').dataset.editId=prefill?.id||'';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function editThesis(id){const t=theses.find(x=>x.id===id);if(t)openModal(t);}
function deleteThesis(id){
  if(!confirm('Delete this thesis?'))return;
  theses=theses.filter(t=>t.id!==id);save();showList();renderAll();
}
function saveThesis(){
  const ticker=document.getElementById('f-ticker').value.trim().toUpperCase();
  if(!ticker){alert('Ticker required');return;}
  const editId=document.getElementById('modalOverlay').dataset.editId;
  const entry={
    id:editId||(ticker+'_'+Date.now()),ticker,
    name:document.getElementById('f-name').value.trim(),
    industry:document.getElementById('f-industry').value.trim()||'Uncategorised',
    view:document.getElementById('f-view').value,
    price:document.getElementById('f-price').value.trim(),
    target:document.getElementById('f-target').value.trim(),
    upside:'',upsideClass:'pos',
    date:new Date().toLocaleDateString('en-GB',{month:'short',year:'numeric'}),
    summary:document.getElementById('f-summary').value.trim(),
    points:document.getElementById('f-points').value.split('\n').map(s=>s.trim()).filter(Boolean),
    risks:document.getElementById('f-risks').value.split('\n').map(s=>s.trim()).filter(Boolean),
    catalysts:document.getElementById('f-catalysts').value.split('\n').map(s=>s.trim()).filter(Boolean),
    financials:document.getElementById('f-financials').value.split('\n').map(s=>s.trim()).filter(Boolean),
  };
  if(editId){const i=theses.findIndex(t=>t.id===editId);if(i!==-1)theses[i]=entry;else theses.unshift(entry);}
  else theses.unshift(entry);
  save();closeModal();showList();renderAll();
}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('click',function(e){
  const sheet=document.getElementById('filterSheet');
  if(sheet.classList.contains('open')&&!sheet.contains(e.target)&&!e.target.closest('#tab-filter'))
    sheet.classList.remove('open');
});
load();renderAll();
</script>
</body>
</html>
